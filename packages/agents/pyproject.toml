[project]
name = "forum-agents"
version = "0.0.1"
description = "LLM orchestrator and sub-agents"
requires-python = ">=3.12"
dependencies = [
    "anthropic>=0.42.0",
    "langgraph>=0.2.0",
    "forum-browser",
    "forum-schemas",
    "playwright>=1.49.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.25",
    "pytest-mock>=3.14",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/forum_agents"]

[tool.mypy]
python_version = "3.12"
strict = true
plugins = ["pydantic.mypy"]

[tool.ruff]
line-length = 120
