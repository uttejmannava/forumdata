[project]
name = "forum-schemas"
version = "0.0.1"
description = "Shared Pydantic models for the Forum platform"
requires-python = ">=3.12"
dependencies = [
    "pydantic[email]>=2.10",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/forum_schemas"]

[tool.pytest.ini_options]
testpaths = ["tests"]
