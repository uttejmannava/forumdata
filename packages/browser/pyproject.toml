[project]
name = "forum-browser"
version = "0.0.1"
description = "Playwright automation, anti-detection, proxy management"
requires-python = ">=3.12"
dependencies = [
    "playwright>=1.49",
    "curl-cffi>=0.14",
    "forum-schemas",
    "pydantic>=2.10",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/forum_browser"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.uv.sources]
forum-schemas = { workspace = true }
