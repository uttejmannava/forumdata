[project]
name = "forum-pipeline"
version = "0.1.0"
description = "E-C-T-V-L-N pipeline runtime"
requires-python = ">=3.12"
dependencies = [
    "forum-browser",
    "forum-schemas",
    "playwright>=1.49.0",
    "httpx>=0.27.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.25",
    "pytest-mock>=3.14",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/forum_pipeline"]

[tool.mypy]
python_version = "3.12"
strict = true
plugins = ["pydantic.mypy"]

[tool.ruff]
line-length = 120

[tool.pytest.ini_options]
asyncio_mode = "auto"
